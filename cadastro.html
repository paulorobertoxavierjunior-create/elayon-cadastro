<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro | Elayon Core</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="cadastro">
    <main class="app-shell">
        <img src="https://elayon.space/wp-content/uploads/2026/04/elayon_logo.png" width="120" alt="Elayon Logo">
        <h1>Novo Registro</h1>
        
        <form id="signupForm">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="signupName" required placeholder="Ex: Paulo Roberto">
            </div>
            <div class="form-group">
                <label>E-mail Operacional</label>
                <input type="email" id="signupEmail" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Chave de Acesso (Senha)</label>
                <input type="password" id="signupPassword" required>
            </div>
            <button type="submit" class="btn btn-primary">Ativar Conexão</button>
            <div id="signupMessage"></div>
        </form>
        
        <a href="login.html" class="btn btn-secondary">Já tenho conta</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
