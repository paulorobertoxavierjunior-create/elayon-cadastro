<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cadastro | Elayon Core</title>
    <meta name="theme-color" content="#dff4f6">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="cadastro">
    <div class="wrap">
        <header class="top">
            <div class="brand">
                <div class="logo">
                    <img src="https://elayon.space/wp-content/uploads/2026/04/elayon_logo.png" alt="Elayon" width="56">
                </div>
                <div>
                    <h1>Elayon Core</h1>
                    <p>Registro • Conexão consciente e segura</p>
                </div>
            </div>
        </header>

        <main class="card">
            <h2>Novo Registro</h2>
            <p class="muted">
                Ative sua conexão com presença e clareza. Todos os dados são protegidos com sigilo técnico.
                <br><b>Segurança:</b> Criptografia ponta a ponta. Você controla sua conta.
            </p>

            <form id="signupForm">
                <section class="form-field">
                    <label>Nome Completo</label>
                    <input type="text" id="signupName" required placeholder="Ex: Paulo Roberto">
                </section>

                <section class="form-field">
                    <label>E-mail Operacional</label>
                    <input type="email" id="signupEmail" required placeholder="seu@email.com">
                </section>

                <section class="form-field">
                    <label>Chave de Acesso (Senha)</label>
                    <input type="password" id="signupPassword" required placeholder="••••••••">
                </section>

                <div class="btns-grid">
                    <button type="submit" class="btn-box primary">Ativar Conexão</button>
                    <button type="button" class="btn-box secondary" onclick="window.location.href='login.html'">Já tenho conta</button>
                </div>

                <div id="signupMessage" class="message hide"></div>
            </form>
        </main>

        <footer class="foot">
            <span>Elayon Core • Sigilo e responsabilidade técnica</span>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
