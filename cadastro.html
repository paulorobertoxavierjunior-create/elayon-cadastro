<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cadastro | Elayon Core</title>
    <style>
        /* --- DESIGN GERAL --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg1: #dff4f6; --bg2: #eaf7e3; --card: #ffffff; --ink: #0a2a2f;
            --muted: #4a6b70; --line: #cfe4e7; --accent: #66c7c0; --accent2: #7bd490;
            --shadow: 0 10px 30px rgba(0,0,0,.08);
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, var(--bg2), var(--bg1));
            min-height: 100vh;
            color: var(--ink);
            padding-top: 70px; /* Espaço para o menu fixo não cobrir o site */
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- MENU SUPERIOR MAROTO --- */
        .site-nav {
            width: 100%; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
            padding: 12px 0; position: fixed; top: 0; left: 0; z-index: 9999;
        }
        .nav-container {
            max-width: 520px; margin: 0 auto;
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
        .nav-link {
            text-decoration: none; color: var(--muted); font-size: 11px;
            font-weight: 700; padding: 6px 10px; border-radius: 8px;
            transition: 0.2s; text-transform: uppercase;
        }
        .nav-link:hover { background: var(--accent); color: white; }

        /* --- CARD DE CADASTRO --- */
        .wrap { width: 100%; max-width: 480px; padding: 20px; }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .logo-box { width: 45px; height: 45px; border-radius: 10px; background: #fff; border: 1px solid var(--line); overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .card {
            background: white; padding: 30px; border-radius: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--line);
        }
        h2 { font-size: 26px; margin-bottom: 8px; letter-spacing: -1px; }
        .muted-text { color: var(--muted); font-size: 14px; margin-bottom: 25px; line-height: 1.4; }

        .form-field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 13px; }
        input {
            width: 100%; padding: 14px 18px; border-radius: 12px;
            border: 2px solid var(--line); font-size: 16px; background: #fdfdfd; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; background: #fff; }

        .btns-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-box {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            font-size: 16px; font-weight: 700; cursor: pointer; text-align: center;
            text-decoration: none; transition: 0.2s;
        }
        .primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--ink); }
        .secondary { background: #f0f7f7; color: var(--ink); border: 1px solid var(--line); }
        .btn-box:hover { transform: translateY(-2px); filter: brightness(1.05); }

        .foot { text-align: center; margin: 20px 0; color: var(--muted); font-size: 11px; }
        .hide { display: none !important; }
    </style>
</head>
<body data-page="cadastro">

    <nav class="site-nav">
        <div class="nav-container">
            <a href="projeto.html" class="nav-link">Projeto</a>
            <a href="termos.html" class="nav-link">Termos</a>
            <a href="privacidade-dados.html" class="nav-link">Privacidade</a>
            <a href="contato.html" class="nav-link">Contato</a>
        </div>
    </nav>

    <div class="wrap">
        <header class="logo-area">
            <div class="logo-box">
                <img src="https://elayon.space/wp-content/uploads/2026/04/elayon_logo.png" alt="Logo">
            </div>
            <div>
                <h1 style="font-size: 18px;">Elayon Core</h1>
                <p style="font-size: 12px; color: var(--muted);">Conexão Segura</p>
            </div>
        </header>

        <main class="card">
            <h2>Novo Registro</h2>
            <p class="muted-text">Ative sua conexão com presença e clareza. Dados protegidos com sigilo técnico.</p>

            <form id="signupForm">
                <div class="form-field">
                    <label>Nome Completo</label>
                    <input type="text" id="signupName" required placeholder="Ex: Paulo Roberto">
                </div>
                <div class="form-field">
                    <label>E-mail Operacional</label>
                    <input type="email" id="signupEmail" required placeholder="seu@email.com">
                </div>
                <div class="form-field">
                    <label>Chave de Acesso</label>
                    <input type="password" id="signupPassword" required placeholder="••••••••">
                </div>

                <div class="btns-grid">
                    <button type="submit" class="btn-box primary">Ativar Conexão</button>
                    <button type="button" class="btn-box secondary" onclick="window.location.href='login.html'">Já tenho conta</button>
                </div>
                <div id="signupMessage" class="message hide"></div>
            </form>
        </main>

        <footer class="foot">
            <span>Elayon Core • Sigilo e responsabilidade técnica</span>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>

<button onclick="runTunnelTests()">Rodar Diagnóstico</button>
<pre id="logTech"></pre>

</body>
</html>
