<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Elayon Core</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="login">
    <main class="auth-container">
        <div class="glass-card">
            <div class="logo-area">
                <img src="https://elayon.space/wp-content/uploads/2026/04/elayon_logo.png" alt="Elayon Logo" width="120">
            </div>
            
            <h2>Conectar ao Núcleo</h2>
            <p class="subtitle">Insira suas credenciais de acesso</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    <span>Entrar no Sistema</span>
                </button>
            </form>

            <div id="message" class="message-box"></div>

            <div class="auth-footer">
                <p>Não tem conta? <a href="index.html">Criar Cadastro</a></p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
