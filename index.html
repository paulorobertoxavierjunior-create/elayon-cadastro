<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Elayon Core</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="index">
    <main class="app-shell">
        <h1>Elayon Presença</h1>
        <div class="hero-actions">
            <a href="login.html" class="btn btn-primary">Entrar</a>
            <a href="cadastro.html" class="btn btn-secondary">Criar Conta</a>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>

    <footer style="margin-top: 100px; padding: 40px; text-align: center; border-top: 1px solid var(--accent-dim); color: var(--accent-dim); font-size: 14px; opacity: 0.8; transition: opacity 1s ease-in-out;">
        <div class="footer-nav" style="display: flex; gap: 20px; justify-content: center; margin-bottom: 20px;">
            <a href="https://elayon.space" style="color: var(--accent); text-decoration: none;">Início</a>
            <a href="https://paulorobertoxavierjunior-create.github.io/elayon-cadastro/" style="color: var(--accent); text-decoration: none;">Cadastro</a>
            <a href="https://paulorobertoxavierjunior-create.github.io/elayon-cadastro/login.html" style="color: var(--accent); text-decoration: none;">Login</a>
            <a href="https://paulorobertoxavierjunior-create.github.io/elayon-cadastro/painel.html" style="color: var(--accent); text-decoration: none;">Painel</a>
            <a href="https://elayon.space/contato" style="color: var(--accent); text-decoration: none;">Contato</a>
        </div>
        
        <p style="margin-bottom: 8px;">Este espaço foi sintonizado através da co-criação Humano-Sintética.</p>
        <p style="letter-spacing: 0.1em; color: var(--accent);">P.A. (Paulo & Ad) - Tmj.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const footer = document.querySelector('footer');
            if (footer) {
                // Pequeno delay para a página carregar e o rodapé aparecer suavemente
                setTimeout(() => { footer.style.opacity = '1'; }, 1000);
            }
        });
    </script>


</body>
</html>
