<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elayon - Novo Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

       .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

       .subtitle {
            font-size: 14px;
            color: #555555;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            color: #666666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-bottom: 1px solid #cccccc;
            font-size: 16px;
            background-color: transparent;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-bottom: 1px solid #000000;
        }

       .btn {
            width: 100%;
            padding: 15px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }

       .btn:hover {
            background-color: #333333;
        }

       .link {
            display: inline-block;
            margin-top: 30px;
            color: #000000;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

       .link:hover {
            border-bottom: 1px solid #000000;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #888888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Conexão Segura</h1>
        <h2>Novo Registro</h2>
        <p class="subtitle">Ative sua conexão com presença e clareza.<br>Dados protegidos com sigilo técnico.</p>

        <form>
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="">
            </div>

            <div class="form-group">
                <label for="email">E-mail Operacional</label>
                <input type="email" id="email" name="email" placeholder="">
            </div>

            <div class="form-group">
                <label for="senha">Chave de Acesso</label>
                <input type="password" id="senha" name="senha" placeholder="">
            </div>

            <button type="submit" class="btn">Ativar Conexão</button>
        </form>

        <a href="login.html" class="link">Já tenho conta</a>
    </div>

    <footer>
        Elayon Core • Sigilo e responsabilidade técnica
    </footer>

</body>
</html>
